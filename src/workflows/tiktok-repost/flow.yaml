# src/flows/presets/tiktok-repost.flow.yaml
# ─────────────────────────────────────────
# Workflow: Scan TikTok → Loop(dedup → download → caption → publish → wait)

# ── METADATA ─────────────────────────────
id: tiktok-repost
name: TikTok Repost
description: Scan TikTok channels → Download → Edit caption → Publish
icon: 🔄
color: "#00f2ea"
version: "2.0"

# ── NODES ────────────────────────────────
nodes:
  - node_id: tiktok.scanner
    instance_id: scanner_1
    timeout: 30000

  - node_id: core.loop
    instance_id: video_loop
    children: [dedup_1, downloader_1, caption_1, publisher_1, timeout_1]

  - node_id: core.deduplicator
    instance_id: dedup_1

  - node_id: core.downloader
    instance_id: downloader_1

  - node_id: core.caption_gen
    instance_id: caption_1

  - node_id: tiktok.publisher
    instance_id: publisher_1
    on_error: skip
    events:
      captcha:detected:
        action: skip_item
        emit: campaign:needs_captcha
      violation:detected:
        action: skip_item

  - node_id: core.timeout
    instance_id: timeout_1

# ── EDGES ────────────────────────────────
edges:
  - from: scanner_1
    to: video_loop
