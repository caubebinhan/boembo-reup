# src/flows/presets/tiktok-repost.flow.yaml
# ─────────────────────────────────────────
# Workflow: Scan → Schedule → Loop(check → dedup → download → caption → publish → condition → notify) → Finish

# ── METADATA ─────────────────────────────
id: tiktok-repost
name: TikTok Repost
description: Scan TikTok channels → Schedule → Download → Edit caption → Publish
icon: 🔄
color: "#00f2ea"
version: "3.0"

# ── NODES ────────────────────────────────
nodes:
  - node_id: tiktok.scanner
    instance_id: scanner_1
    timeout: 30000

  - node_id: core.video_scheduler
    instance_id: scheduler_1

  # Loop children: all nodes including condition + notify are INSIDE the loop
  # so they fire per-video iteration
  - node_id: core.loop
    instance_id: video_loop
    children:
      - check_time_1
      - dedup_1
      - downloader_1
      - caption_1
      - account_dedup_1
      - publisher_1
      - cond_violation_1
      - notify_violation_1
      - cond_captcha_1
      - notify_captcha_1
      - cond_publish_failed_1
      - notify_publish_failed_1

  - node_id: core.check_in_time
    instance_id: check_time_1

  - node_id: core.deduplicator
    instance_id: dedup_1

  - node_id: core.downloader
    instance_id: downloader_1

  - node_id: core.caption_gen
    instance_id: caption_1

  - node_id: tiktok.account_dedup
    instance_id: account_dedup_1

  - node_id: tiktok.publisher
    instance_id: publisher_1
    on_error: skip
    events:
      captcha:detected:
        action: skip_item
        emit: campaign:needs_captcha

  # ── Condition + Notify nodes (loop children) ───────────────────
  - node_id: core.condition
    instance_id: cond_violation_1
    params:
      expression: "status === 'violation'"

  - node_id: core.notify
    instance_id: notify_violation_1
    params:
      title: "⚠️ Vi phạm chính sách"
      body: "Video \"{{description}}\" từ @{{author}} bị vi phạm chính sách TikTok"
      sound: true

  - node_id: core.condition
    instance_id: cond_captcha_1
    params:
      expression: "status === 'captcha'"

  - node_id: core.notify
    instance_id: notify_captcha_1
    params:
      title: "🤖 Cần giải CAPTCHA"
      body: "Boembo cần bạn giải CAPTCHA để tiếp tục publish video"
      sound: true

  - node_id: core.condition
    instance_id: cond_publish_failed_1
    params:
      expression: "status === 'failed'"

  - node_id: core.notify
    instance_id: notify_publish_failed_1
    params:
      title: "❌ Publish thất bại"
      body: "Video \"{{description}}\" từ @{{author}} bị lỗi khi publish"
      sound: true

  # ── After loop finishes ────────────────────────────────────────
  - node_id: core.condition
    instance_id: cond_mode_check_1
    params:
      expression: "params.timeRange !== 'history_only' && !(params.timeRange === 'custom_range' && params.endDate)"

  - node_id: core.monitoring
    instance_id: monitor_1

  - node_id: core.campaign_finish
    instance_id: finish_1

  - node_id: core.notify
    instance_id: notify_finish_1
    params:
      title: "✅ Hoàn tất Campaign"
      body: "Đã xử lý xong tất cả video. Kết quả sẽ hiển thị trong Campaign Detail."
      sound: false

# ── EDGES ────────────────────────────────
# Note: edges INSIDE the loop use conditional `when` to route per-video
edges:
  - from: scanner_1
    to: scheduler_1
  - from: scheduler_1
    to: video_loop

  # Conditional per-video notifications (inside loop)
  - from: publisher_1
    to: cond_violation_1
  - from: cond_violation_1
    to: notify_violation_1
    when: "branch === 'true'"

  - from: publisher_1
    to: cond_captcha_1
  - from: cond_captcha_1
    to: notify_captcha_1
    when: "branch === 'true'"

  - from: publisher_1
    to: cond_publish_failed_1
  - from: cond_publish_failed_1
    to: notify_publish_failed_1
    when: "branch === 'true'"

  # After loop → check mode
  - from: video_loop
    to: cond_mode_check_1
    
  # Mode check true → monitoring
  - from: cond_mode_check_1
    to: monitor_1
    when: "branch === 'true'"
    
  # Mode check false → finish
  - from: cond_mode_check_1
    to: finish_1
    when: "branch === 'false'"

  # If new videos found → scheduler
  - from: monitor_1
    to: scheduler_1

  # Finish → Notify Finish
  - from: finish_1
    to: notify_finish_1
